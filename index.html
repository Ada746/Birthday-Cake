<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Happy Birthday!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg">
    <div class="sparkles" aria-hidden="true"></div>

    <main class="stage">
      <div class="card">
        <h1 class="title">🎀 Surprise!</h1>

        <div class="cake-area">
          <div class="plate"></div>

          <!-- Cake parts (start above, then fall in) -->
          <div class="layer layer-1"></div>
          <div class="cream cream-1"></div>

          <div class="layer layer-2"></div>
          <div class="cream cream-2"></div>

          <div class="layer layer-3"></div>
          <div class="frost-top"></div>

          <div class="candle">
            <div class="flame"></div>
          </div>
        </div>

        <div class="message">
          <div class="hb">Happy Birthday! ✨</div>
          <div class="sub">Wishing you a day full of sweet moments 💗</div>
        </div>

        <button class="btn" id="replay">Replay</button>
      </div>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
